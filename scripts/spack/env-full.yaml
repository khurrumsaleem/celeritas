spack:
  include:
    - ./packages.yaml
  specs:
    # Packages required for a *truly minimal* build
    - cli11
    - cmake
    - nlohmann-json
    # ... plus packages required for *basic* realistic development
    - geant4
    - git
    - googletest
    - py-pre-commit
    # ... plus *recommended* options
    - covfie
    - g4vg
    - hepmc3
    - ninja
    - vecgeom
    - root
    # documentation
    - doxygen
    - py-breathe
    - py-furo
    - py-sphinx
    - py-sphinxcontrib-bibtex
    # experimental
    - dd4hep
    - mpi
    # R&D
    - git-lfs
    - gh
    # CI
    - py-gcovr
  view: true
  concretizer:
    unify: true
